<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Little Arrivals">
  <meta name="theme-color" content="#FDFBEE">
  <!-- PWA icon as inline SVG data URI -->
  <link rel="apple-touch-icon" id="apple-touch-icon">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 88' fill='none'%3E%3Ccircle cx='40' cy='46' r='38' fill='%23FEF8FB'/%3E%3Cpath d='M16 48 Q13 66 24 76 Q40 86 56 76 Q67 66 64 48 Q56 34 40 32 Q24 34 16 48 Z' fill='%23FDE8F2' stroke='%23D4789A' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M23 52 Q40 45 57 52' fill='none' stroke='%23F0C0D8' stroke-width='1.6' stroke-linecap='round'/%3E%3Cellipse cx='40' cy='30' rx='18' ry='16' fill='%23FFF0E8' stroke='%23D4789A' stroke-width='1.8'/%3E%3Cellipse cx='30' cy='33' rx='4.5' ry='3' fill='%23F5B8CF' opacity='0.55'/%3E%3Cellipse cx='50' cy='33' rx='4.5' ry='3' fill='%23F5B8CF' opacity='0.55'/%3E%3Cpath d='M33 23 Q36 27 39 23' fill='none' stroke='%23C09090' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M41 23 Q44 27 47 23' fill='none' stroke='%23C09090' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M38 28 Q40 30 42 28' fill='none' stroke='%23C8A0A0' stroke-width='1.1' stroke-linecap='round'/%3E%3Cpath d='M34 35 Q40 39 46 35' fill='none' stroke='%23C8A0A0' stroke-width='1.4' stroke-linecap='round'/%3E%3Cpath d='M30 15 Q35 20 40 17 Q45 20 50 15 Q45 10 40 14 Q35 10 30 15 Z' fill='%23F9C8DF' stroke='%23D4789A' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='40' cy='15' r='3' fill='%23F0A8C4' stroke='%23D4789A' stroke-width='1.1'/%3E%3Cpath d='M16 60 Q7 56 9 48 Q13 43 17 50' fill='%23FFF0E8' stroke='%23D4789A' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M64 60 Q73 56 71 48 Q67 43 63 50' fill='%23FFF0E8' stroke='%23D4789A' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Little%20Arrivals%22%2C%22short_name%22%3A%22Arrivals%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23FDFBEE%22%2C%22theme_color%22%3A%22%23FDFBEE%22%7D">
  <title>Little Arrivals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="app-logo">Little <span>Arrivals</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="hdr-date" id="hdr-date"></div>
      <button class="profile-btn" onclick="openProfile()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="6.5" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 16c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-calendar" onclick="switchTab('calendar')">Calendar</button>
    <button class="tab-btn" id="tab-stats" onclick="switchTab('stats')">Stats</button>
    <button class="tab-btn" id="tab-babies" onclick="switchTab('babies')">Babies</button>
  </div>

  <div class="pages-wrap" id="pages-wrap">
    <!-- Calendar Page -->
    <div class="page active" id="page-calendar">
      <div class="month-strip">
        <div class="strip-stat">
          <div class="strip-num p" id="strip-girls">0</div>
          <div class="strip-label">Girls</div>
        </div>
        <div class="strip-div"></div>
        <div class="strip-stat">
          <div class="strip-num b" id="strip-boys">0</div>
          <div class="strip-label">Boys</div>
        </div>
        <div class="strip-div"></div>
        <div class="strip-stat">
          <div class="strip-num g" id="strip-total">0</div>
          <div class="strip-label">This Month</div>
        </div>
      </div>

      <div class="cal-card">
        <div class="cal-nav">
          <button class="cal-arrow" id="prev-m">&#8249;</button>
          <div class="cal-month-wrap">
            <div class="cal-year" id="cal-year"></div>
            <div class="cal-month-name" id="cal-month-name"></div>
          </div>
          <button class="cal-arrow" id="next-m">&#8250;</button>
        </div>
        <div class="cal-weekdays">
          <div class="cal-wday">S</div><div class="cal-wday">M</div>
          <div class="cal-wday">T</div><div class="cal-wday">W</div>
          <div class="cal-wday">T</div><div class="cal-wday">F</div>
          <div class="cal-wday">S</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <div class="day-header">
        <div class="day-title" id="day-label"></div>
        <div class="pill-row">
          <div class="pill g"><div class="pill-dot"></div><span id="day-girls">0</span></div>
          <div class="pill b"><div class="pill-dot"></div><span id="day-boys">0</span></div>
        </div>
      </div>
      <div class="babies-list" id="babies-list"></div>
    </div>

    <!-- Stats Page -->
    <div class="page" id="page-stats">
      <div style="padding-top:4px">
        <div class="stat-grid" id="stat-grid"></div>

        <div class="chart-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <div class="chart-card-title" style="margin-bottom:0" id="daily-chart-title">Daily Deliveries</div>
            <div style="display:flex;align-items:center;gap:6px">
              <button class="cal-arrow" id="chart-prev-m" style="width:28px;height:28px;font-size:14px">&#8249;</button>
              <div style="font-family:var(--fd);font-size:15px;color:var(--ink);min-width:80px;text-align:center" id="chart-month-label"></div>
              <button class="cal-arrow" id="chart-next-m" style="width:28px;height:28px;font-size:14px">&#8250;</button>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="chart-daily" style="display:block;width:100%;height:180px"></canvas></div>
        </div>

        <div class="chart-card">
          <div class="chart-card-title">Gender Split</div>
          <div style="display:flex;align-items:center;gap:20px">
            <div style="width:130px;height:130px;flex-shrink:0;position:relative"><canvas id="chart-donut" width="130" height="130" style="display:block"></canvas></div>
            <div id="donut-legend" style="flex:1"></div>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-card-title">By Day of Week</div>
          <div id="busy-days"></div>
        </div>
      </div>
    </div>

    <!-- Babies Page -->
    <div class="page" id="page-babies">
      <div style="padding-top:8px">
        <div class="machine-wrap" id="machine-wrap"></div>
        <div class="ball-card" id="ball-card" style="display:none"></div>
      </div>
    </div>
  </div>

  <button class="fab" id="fab">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M11 3 L11 19" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M3 11 L19 11" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="overlay" id="overlay"></div>

  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">New Arrival</div>
    <div class="gender-row">
      <button class="gnd-btn girl" id="btn-girl" onclick="selGender('girl')">
        <div class="gnd-face" id="gnd-face-girl"></div>
        <div class="gnd-label">Girl</div>
      </button>
      <button class="gnd-btn boy" id="btn-boy" onclick="selGender('boy')">
        <div class="gnd-face" id="gnd-face-boy"></div>
        <div class="gnd-label">Boy</div>
      </button>
    </div>
    <label class="notes-lbl">Name</label>
    <input class="name-input" id="name-input" type="text" placeholder="Baby's name..." autocomplete="off">
    <label class="notes-lbl">Notes</label>
    <textarea class="notes-ta" id="notes-ta" placeholder="Any notes about this delivery..."></textarea>
    <button class="save-btn" id="save-btn">Record Arrival</button>
  </div>

  <div class="overlay" id="note-overlay"></div>
  <div class="note-popover" id="note-popover">
    <button class="note-popover-close" onclick="closeNotePopover()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="note-popover-avatar" id="note-popover-avatar"></div>
    <div class="note-popover-name" id="note-popover-name"></div>
    <div class="note-popover-sub" id="note-popover-sub"></div>
    <div class="note-popover-body" id="note-popover-body"></div>
  </div>

  <div class="overlay" id="del-overlay"></div>
  <div class="del-modal" id="del-modal">
    <div class="del-modal-title">Delete this arrival?</div>
    <div class="del-modal-sub">This little one will be gone for good.</div>
    <div class="del-modal-btns">
      <button class="del-modal-btn cancel" id="del-cancel">Cancel</button>
      <button class="del-modal-btn confirm" id="del-confirm">Delete</button>
    </div>
  </div>

</div>

<div class="profile-page" id="profile-page">
  <div class="profile-page-header">
    <button class="profile-back" onclick="closeProfile()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="profile-page-title">Profile</div>
  </div>
  <div class="profile-avatar-wrap">
    <div class="profile-avatar" id="profile-avatar" onclick="toggleAvatarPicker()"></div>
  </div>
  <div class="avatar-picker" id="avatar-picker" style="display:none"></div>

  <div class="profile-section-label">Data</div>
  <div class="profile-card">
    <button class="profile-row" onclick="exportData()">
      <div class="profile-row-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v9M5 8l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 14h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <div class="profile-row-text">
        <div class="profile-row-title">Export Backup</div>
        <div class="profile-row-sub">Save all your data as a JSON file</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="profile-divider"></div>
    <button class="profile-row" onclick="document.getElementById('import-input').click()">
      <div class="profile-row-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 15V6M5 10l4-4 4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 4h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <div class="profile-row-text">
        <div class="profile-row-title">Import Backup</div>
        <div class="profile-row-sub">Restore data from a JSON file</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(this)">
  </div>
</div>

  <script src="app.js"></script>
</body>
</html>
