<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Little Arrivals">
<meta name="theme-color" content="#FDFBEE">
<!-- PWA icon as inline SVG data URI -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23FEF8FB'/%3E%3Cellipse cx='90' cy='96' rx='42' ry='38' fill='%23FDE8F2' stroke='%23D4789A' stroke-width='4'/%3E%3Cpath d='M48 100 Q44 130 58 144 Q90 162 122 144 Q136 130 132 100 Q118 76 90 72 Q62 76 48 100 Z' fill='%23FDE8F2' stroke='%23D4789A' stroke-width='4'/%3E%3Cpath d='M55 106 Q90 94 125 106' fill='none' stroke='%23F0C0D8' stroke-width='3' stroke-linecap='round'/%3E%3Cellipse cx='90' cy='72' rx='36' ry='32' fill='%23FFF0E8' stroke='%23D4789A' stroke-width='3.5'/%3E%3Cellipse cx='74' cy='78' rx='9' ry='6' fill='%23F5B8CF' opacity='0.55'/%3E%3Cellipse cx='106' cy='78' rx='9' ry='6' fill='%23F5B8CF' opacity='0.55'/%3E%3Cpath d='M78 63 Q84 69 90 63 Q96 69 102 63' fill='none' stroke='%23C09090' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M82 82 Q90 88 98 82' fill='none' stroke='%23C8A0A0' stroke-width='2.5' stroke-linecap='round'/%3E%3Cpath d='M64 42 Q72 52 90 47 Q108 52 116 42 Q108 32 90 38 Q72 32 64 42 Z' fill='%23F9C8DF' stroke='%23D4789A' stroke-width='3'/%3E%3Ccircle cx='90' cy='42' r='7' fill='%23F0A8C4' stroke='%23D4789A' stroke-width='2.5'/%3E%3C%2Fsvg%3E">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Little%20Arrivals%22%2C%22short_name%22%3A%22Arrivals%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23FDFBEE%22%2C%22theme_color%22%3A%22%23FDFBEE%22%7D">
<title>Little Arrivals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #FDFBEE;
  --paper: #FFFFFF;
  --grid-line: rgba(160,140,60,0.07);

  --pink: #FAD4E4;
  --pink-mid: #F4C0D5;
  --pink-deep: #C890AA;
  --pink-bg: #FEF6FA;

  --blue: #C0DFF0;
  --blue-mid: #AACFE8;
  --blue-deep: #78AACC;
  --blue-bg: #F3FAFD;

  --ink: #4A4038;
  --ink-mid: #807060;
  --ink-light: #B0A090;
  --line: rgba(80,60,40,0.08);

  --green-deep: #80B078;
  --yellow: #FAF0A8;

  --fd: 'Jua', sans-serif;
  --fu: 'Figtree', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body { height:100%; background:var(--bg); font-family:var(--fu); color:var(--ink); overflow:hidden; }

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:28px 28px;
  pointer-events:none; z-index:0;
}

#app {
  height:100dvh;
  display:flex; flex-direction:column;
  max-width:430px; margin:0 auto;
  position:relative; overflow:hidden; z-index:1;
}

.app-header {
  padding:12px 20px 8px;
  padding-top:max(14px,env(safe-area-inset-top));
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}

.app-logo { font-family:var(--fd); font-size:26px; color:var(--ink); line-height:1; }
.app-logo span { color:var(--pink-deep); }

.hdr-date { font-size:13px; font-weight:600; color:var(--ink-light); }

.tab-bar {
  display:flex; padding:0 20px 8px; gap:6px; flex-shrink:0;
}

.tab-btn {
  flex:1; padding:7px 0;
  border-radius:20px; border:1.5px solid transparent;
  background:transparent; font-family:var(--fu);
  font-size:13px; font-weight:600; color:var(--ink-light);
  cursor:pointer; transition:all 0.15s;
}

.tab-btn.active {
  background:#FFFFFF;
  border-color:var(--line);
  color:var(--ink);
  box-shadow:0 2px 8px rgba(80,60,40,0.07);
}

.pages-wrap { flex:1; overflow:hidden; position:relative; }
.page { display:none; width:100%; height:100%; overflow-y:auto; overflow-x:hidden; padding:0 16px 100px; -webkit-overflow-scrolling:touch; }
.page.active { display:block; }

/* Strip */
.month-strip {
  background:#FFFFFF; border-radius:18px; border:1.5px solid var(--line);
  padding:12px 8px; margin-bottom:14px;
  display:flex; align-items:center; justify-content:space-around;
}
.strip-stat { display:flex; flex-direction:column; align-items:center; gap:1px; }
.strip-num { font-family:var(--fd); font-size:28px; line-height:1; }
.strip-num.p { color:var(--pink-deep); }
.strip-num.b { color:var(--blue-deep); }
.strip-num.g { color:var(--green-deep); }
.strip-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink-light); }
.strip-div { width:1px; height:36px; background:var(--line); }

/* Cal card */
.cal-card {
  background:#FFFFFF; border-radius:18px; border:1.5px solid var(--line);
  padding:16px 12px; margin-bottom:16px;
}

.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-month-wrap { text-align:center; }
.cal-year { font-size:11px; font-weight:600; color:var(--ink-light); letter-spacing:1px; text-transform:uppercase; }

.cal-month-name {
  font-family:var(--fd); font-size:28px; color:var(--ink); line-height:1.2;
  position:relative; display:inline-block;
}
.cal-month-name::after {
  content:''; position:absolute; bottom:2px; left:-4px; right:-4px; height:10px;
  background:rgba(111,184,220,0.25); border-radius:4px; z-index:-1;
}

.cal-arrow {
  background:#FFFFFF; border:1.5px solid var(--line); border-radius:50%;
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; color:var(--ink-mid); flex-shrink:0; transition:transform 0.1s;
}
.cal-arrow:active { transform:scale(0.9); }

.cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:6px; }
.cal-wday { text-align:center; font-size:10px; font-weight:700; color:var(--ink-light); text-transform:uppercase; letter-spacing:0.5px; padding:3px 0; }

.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }

.cal-day {
  aspect-ratio:1; border-radius:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  padding-top:4px; cursor:pointer; border:1.5px solid transparent;
  transition:background 0.12s; min-height:42px;
}
.cal-day:active { transform:scale(0.9); }
.cal-day.empty { cursor:default; pointer-events:none; }
.cal-day.today { background:#FAF0A8; border-color:rgba(160,140,40,0.2); }
.cal-day.selected { border-color:var(--pink-deep); background:var(--pink-bg); }
.cal-day.has-data:not(.today):not(.selected) { background:rgba(255,255,255,0.55); }

.cal-day-num { font-family:var(--fd); font-size:13px; color:var(--ink); line-height:1; }
.cal-day.today .cal-day-num { color:#7A5800; }

.cal-faces { display:flex; flex-wrap:wrap; justify-content:center; gap:1px; margin-top:2px; padding:0 2px; }

.cal-face {
  width:10px; height:10px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.cal-face.girl { background:var(--pink-mid); }
.cal-face.boy { background:var(--blue-mid); }

/* Day */
.day-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.day-title { font-family:var(--fd); font-size:22px; color:var(--ink); }
.pill-row { display:flex; gap:6px; }
.pill { display:flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:13px; font-weight:700; }
.pill.g { background:#FEF6FA; color:#C890AA; }
.pill.b { background:#F3FAFD; color:#78AACC; }
.pill-dot { width:7px; height:7px; border-radius:50%; }
.pill.g .pill-dot { background:var(--pink-mid); }
.pill.b .pill-dot { background:var(--blue-mid); }

.babies-list { display:flex; flex-direction:column; gap:10px; }

.baby-card {
  background:#FFFFFF; border-radius:16px; border:1.5px solid var(--line);
  padding:14px; display:flex; align-items:center; gap:12px;
  animation:popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{transform:scale(0.88) translateY(8px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

.baby-blob { width:52px; height:52px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }

.baby-info { flex:1; min-width:0; }
.baby-gender { font-family:var(--fd); font-size:17px; color:var(--ink); line-height:1.1; }
.baby-time { font-size:12px; color:var(--ink-light); margin-top:2px; }
.baby-note { font-size:12px; color:var(--ink-mid); margin-top:3px; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.baby-del { background:none; border:none; cursor:pointer; color:var(--ink-light); font-size:16px; padding:6px; flex-shrink:0; }
.baby-del:active { color:#E24B4A; }

.empty-day { text-align:center; padding:28px 20px; background:#FFFFFF; border-radius:16px; border:1.5px dashed rgba(80,60,40,0.12); }
.empty-face { font-size:38px; display:block; margin-bottom:6px; opacity:0.35; }
.empty-text { font-family:var(--fd); font-size:17px; color:var(--ink-light); }

/* FAB */
.fab {
  position:fixed; bottom:calc(18px + env(safe-area-inset-bottom)); right:20px;
  width:56px; height:56px; border-radius:50%;
  background:#F4C0D5; border:2px solid #C890AA;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  z-index:100; box-shadow:0 4px 16px rgba(180,120,150,0.2); transition:transform 0.15s;
}
.fab:active { transform:scale(0.9); }

/* Sheet */
.overlay {
  position:fixed; inset:0; background:rgba(30,20,10,0.28);
  z-index:200; opacity:0; pointer-events:none; transition:opacity 0.22s;
}
.overlay.open { opacity:1; pointer-events:all; }

.sheet {
  position:fixed; bottom:0; left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%; max-width:430px;
  background:#FDFBEE; border-radius:24px 24px 0 0; border:1.5px solid var(--line); border-bottom:none;
  padding:20px 24px calc(32px + env(safe-area-inset-bottom));
  z-index:201; transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1);
}
.sheet.open { transform:translateX(-50%) translateY(0); }

.sheet-handle { width:38px; height:4px; background:var(--line); border-radius:2px; margin:0 auto 18px; }
.sheet-title { font-family:var(--fd); font-size:24px; color:var(--ink); margin-bottom:18px; text-align:center; }

.gender-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }

.gnd-btn {
  border-radius:18px; border:2px solid var(--line); padding:18px 10px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  cursor:pointer; background:#FFFFFF; transition:all 0.13s;
}
.gnd-btn.girl.sel { background:var(--pink-bg); border-color:var(--pink-mid); }
.gnd-btn.boy.sel { background:var(--blue-bg); border-color:var(--blue-mid); }
.gnd-btn:active { transform:scale(0.95); }

.gnd-face { width:56px; height:56px; display:flex; align-items:center; justify-content:center; }

.gnd-label { font-family:var(--fd); font-size:18px; color:var(--ink); }

.notes-lbl { display:block; font-size:13px; font-weight:600; color:var(--ink-mid); margin-bottom:7px; }
.notes-ta {
  width:100%; border:1.5px solid var(--line); border-radius:12px;
  padding:11px 13px; font-family:var(--fu); font-size:15px; color:var(--ink);
  background:#FFFFFF; resize:none; height:76px; outline:none; margin-bottom:16px;
}
.notes-ta:focus { border-color:var(--pink-mid); }
.notes-ta::placeholder { color:var(--ink-light); }

.save-btn {
  width:100%; padding:15px; border-radius:14px; border:none;
  background:#E0D0D8; color:#B8A8B0;
  font-family:var(--fd); font-size:20px;
  cursor:default; transition:all 0.2s; box-shadow:none;
}
.save-btn.enabled {
  background:var(--pink-mid); color:white;
  cursor:pointer; box-shadow:0 4px 14px rgba(180,120,150,0.18);
}
.save-btn.enabled:active { transform:scale(0.97); }

/* Charts */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.stat-card { background:#FFFFFF; border-radius:16px; border:1.5px solid var(--line); padding:14px 16px; display:flex; flex-direction:column; gap:4px; }
.stat-card-num { font-family:var(--fd); font-size:32px; line-height:1; }
.stat-card-num.p { color:var(--pink-deep); }
.stat-card-num.b { color:var(--blue-deep); }
.stat-card-num.g { color:var(--green-deep); }
.stat-card-num.y { color:#7A6000; }
.stat-card-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--ink-light); }

.chart-card { background:#FFFFFF; border-radius:18px; border:1.5px solid var(--line); padding:16px; margin-bottom:14px; }
.chart-card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink-light); margin-bottom:14px; }
.chart-wrap { position:relative; height:180px; }

.month-row { background:#FFFFFF; border-radius:14px; border:1.5px solid var(--line); padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
.month-row-name { font-family:var(--fd); font-size:15px; color:var(--ink); width:48px; flex-shrink:0; }
.month-bar-wrap { flex:1; display:flex; flex-direction:column; gap:5px; }
.month-bar-row { display:flex; align-items:center; gap:6px; }
.month-bar-bg { flex:1; height:9px; background:rgba(80,60,40,0.07); border-radius:9px; overflow:hidden; }
.month-bar-fill { height:100%; border-radius:9px; transition:width 0.4s ease; }
.month-bar-fill.p { background:var(--pink-mid); }
.month-bar-fill.b { background:var(--blue-mid); }
.month-bar-count { font-size:11px; font-weight:700; color:var(--ink-mid); width:16px; text-align:right; flex-shrink:0; }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
</style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="app-logo">Little <span>Arrivals</span></div>
    <div class="hdr-date" id="hdr-date"></div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-calendar" onclick="switchTab('calendar')">Calendar</button>
    <button class="tab-btn" id="tab-charts" onclick="switchTab('charts')">Charts</button>
  </div>

  <div class="pages-wrap" id="pages-wrap">
  <!-- Calendar Page -->
  <div class="page active" id="page-calendar">
    <div class="month-strip">
      <div class="strip-stat">
        <div class="strip-num p" id="strip-girls">0</div>
        <div class="strip-label">Girls</div>
      </div>
      <div class="strip-div"></div>
      <div class="strip-stat">
        <div class="strip-num b" id="strip-boys">0</div>
        <div class="strip-label">Boys</div>
      </div>
      <div class="strip-div"></div>
      <div class="strip-stat">
        <div class="strip-num g" id="strip-total">0</div>
        <div class="strip-label">This Month</div>
      </div>
    </div>

    <div class="cal-card">
      <div class="cal-nav">
        <button class="cal-arrow" id="prev-m">&#8249;</button>
        <div class="cal-month-wrap">
          <div class="cal-year" id="cal-year"></div>
          <div class="cal-month-name" id="cal-month-name"></div>
        </div>
        <button class="cal-arrow" id="next-m">&#8250;</button>
      </div>
      <div class="cal-weekdays">
        <div class="cal-wday">S</div><div class="cal-wday">M</div>
        <div class="cal-wday">T</div><div class="cal-wday">W</div>
        <div class="cal-wday">T</div><div class="cal-wday">F</div>
        <div class="cal-wday">S</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="day-header">
      <div class="day-title" id="day-label"></div>
      <div class="pill-row">
        <div class="pill g"><div class="pill-dot"></div><span id="day-girls">0</span></div>
        <div class="pill b"><div class="pill-dot"></div><span id="day-boys">0</span></div>
      </div>
    </div>
    <div class="babies-list" id="babies-list"></div>
  </div>

  <!-- Charts Page -->
  <div class="page" id="page-charts">
    <div style="padding-top:4px">
      <div class="stat-grid" id="stat-grid"></div>

      <div class="chart-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="chart-card-title" style="margin-bottom:0" id="daily-chart-title">Daily Deliveries</div>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="cal-arrow" id="chart-prev-m" style="width:28px;height:28px;font-size:14px">&#8249;</button>
            <div style="font-family:var(--fd);font-size:15px;color:var(--ink);min-width:80px;text-align:center" id="chart-month-label"></div>
            <button class="cal-arrow" id="chart-next-m" style="width:28px;height:28px;font-size:14px">&#8250;</button>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="chart-daily" style="display:block;width:100%;height:180px"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-card-title">Gender Split</div>
        <div style="display:flex;align-items:center;gap:20px">
          <div style="width:130px;height:130px;flex-shrink:0;position:relative"><canvas id="chart-donut" width="130" height="130" style="display:block"></canvas></div>
          <div id="donut-legend" style="flex:1"></div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-card-title">By Day of Week</div>
        <div id="busy-days"></div>
      </div>
    </div>
  </div>
</div>

<button class="fab" id="fab">
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M11 3 L11 19" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M3 11 L19 11" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  </svg>
</button>
<div class="overlay" id="overlay"></div>

<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">New Arrival &#128149;</div>
  <div class="gender-row">
    <button class="gnd-btn girl" id="btn-girl" onclick="selGender('girl')">
      <div class="gnd-face" id="gnd-face-girl"></div>
      <div class="gnd-label">Girl</div>
    </button>
    <button class="gnd-btn boy" id="btn-boy" onclick="selGender('boy')">
      <div class="gnd-face" id="gnd-face-boy"></div>
      <div class="gnd-label">Boy</div>
    </button>
  </div>
  <label class="notes-lbl">Notes (optional)</label>
  <textarea class="notes-ta" id="notes-ta" placeholder="Any notes about this delivery..."></textarea>
  <button class="save-btn" id="save-btn">Record Arrival</button>
</div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let vY = new Date().getFullYear();
let vM = new Date().getMonth();
let selDate = todayKey();
let sg = null;
let data = {};
let cDaily = null, cDonut = null;
let chartVY = new Date().getFullYear(), chartVM = new Date().getMonth();

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function dKey(y,m,d) { return `${y}-${p2(m+1)}-${p2(d)}`; }
function p2(n) { return String(n).padStart(2,"0"); }
function load() { try { data = JSON.parse(localStorage.getItem("la3")||"{}"); } catch(e) { data={}; } }
function save() { localStorage.setItem("la3", JSON.stringify(data)); }
function babies(k) { return data[k]||[]; }

function monthStats(y,m) {
  const pfx = `${y}-${p2(m+1)}`;
  let g=0,b=0;
  Object.entries(data).forEach(([k,v])=>{ if(k.startsWith(pfx)) v.forEach(x=>x.gender==="girl"?g++:b++); });
  return {g,b,total:g+b};
}

function allStats() {
  let g=0,b=0,ds=new Set();
  Object.entries(data).forEach(([k,v])=>{ if(v.length){ds.add(k);v.forEach(x=>x.gender==="girl"?g++:b++);} });
  return {g,b,total:g+b,days:ds.size};
}

function switchTab(t) { setTab(t==="charts"?1:0); }

function renderHeader() {
  const d = new Date();
  document.getElementById("hdr-date").textContent = `${DAYS[d.getDay()]} ${d.getDate()} ${MS[d.getMonth()]}`;
}

function renderStrip() {
  const s = monthStats(vY,vM);
  document.getElementById("strip-girls").textContent = s.g;
  document.getElementById("strip-boys").textContent = s.b;
  document.getElementById("strip-total").textContent = s.total;
}

function renderCal() {
  document.getElementById("cal-year").textContent = vY;
  document.getElementById("cal-month-name").textContent = MONTHS[vM];
  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";
  const first = new Date(vY,vM,1).getDay();
  const total = new Date(vY,vM+1,0).getDate();
  const today = todayKey();

  for(let i=0;i<first;i++) { const e=document.createElement("div"); e.className="cal-day empty"; grid.appendChild(e); }

  for(let d=1;d<=total;d++) {
    const key = dKey(vY,vM,d);
    const bs = babies(key);
    const el = document.createElement("div");
    let cls = "cal-day";
    if(key===today) cls+=" today";
    if(key===selDate) cls+=" selected";
    if(bs.length) cls+=" has-data";
    el.className = cls;

    const max = Math.min(bs.length,4);
    let fh = "";
    bs.slice(0,max).forEach(b=>{
      fh+=`<div class="cal-face ${b.gender}">
        <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3.5" fill="white" opacity="0.3"/><circle cx="2.8" cy="3.5" r="0.7" fill="white"/><circle cx="5.2" cy="3.5" r="0.7" fill="white"/><path d="M2.8 5.5 Q4 7 5.2 5.5" stroke="white" stroke-width="0.7" stroke-linecap="round" fill="none"/></svg>
      </div>`;
    });
    if(bs.length>4) fh+=`<div style="font-size:7px;font-weight:700;color:var(--ink-mid);align-self:center">+${bs.length-4}</div>`;

    el.innerHTML=`<div class="cal-day-num">${d}</div><div class="cal-faces">${fh}</div>`;
    el.addEventListener("click",()=>{ selDate=key; renderCal(); renderDay(); });
    grid.appendChild(el);
  }
}

function renderDay() {
  const key = selDate;
  const [y,m,d] = key.split("-").map(Number);
  const dt = new Date(y,m-1,d);
  document.getElementById("day-label").textContent = `${DAYS[dt.getDay()]}, ${MS[m-1]} ${d}`;
  const bs = babies(key);
  document.getElementById("day-girls").textContent = bs.filter(x=>x.gender==="girl").length;
  document.getElementById("day-boys").textContent = bs.filter(x=>x.gender==="boy").length;

  const list = document.getElementById("babies-list");
  if(!bs.length) {
    list.innerHTML=`<div class="empty-day"><span class="empty-face">&#128120;</span><div class="empty-text">No arrivals recorded yet</div></div>`;
    return;
  }
  list.innerHTML = bs.map((b,i)=>{
    const ig = b.gender==="girl";
    return `<div class="baby-card">
      <div class="baby-blob ${b.gender}">${ig?girlSVG():boySVG()}</div>
      <div class="baby-info">
        <div class="baby-gender">Baby ${ig?"Girl":"Boy"}</div>
        ${b.time?`<div class="baby-time">${b.time}</div>`:""}
        ${b.note?`<div class="baby-note">${esc(b.note)}</div>`:""}
      </div>
      <button class="baby-del" onclick="delBaby('${key}',${i})">&#10005;</button>
    </div>`;
  }).join("");
}

function delBaby(key,idx) {
  if(!data[key]) return;
  data[key].splice(idx,1);
  if(!data[key].length) delete data[key];
  save(); renderCal(); renderStrip(); renderDay();
}

function selGender(g) {
  sg = g;
  document.getElementById("btn-girl").classList.toggle("sel",g==="girl");
  document.getElementById("btn-boy").classList.toggle("sel",g==="boy");
  document.getElementById("save-btn").classList.add("enabled");
}

function openSheet() {
  sg = null;
  document.getElementById("btn-girl").classList.remove("sel");
  document.getElementById("btn-boy").classList.remove("sel");
  document.getElementById("notes-ta").value = "";
  document.getElementById("save-btn").classList.remove("enabled");
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}

function closeSheet() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
}

function saveArrival() {
  if(!sg) {
    const gr = document.querySelector(".gender-row");
    gr.style.animation="none";
    requestAnimationFrame(()=>gr.style.animation="shake 0.3s ease");
    return;
  }
  const note = document.getElementById("notes-ta").value.trim();
  const now = new Date();
  const time = now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  if(!data[selDate]) data[selDate]=[];
  data[selDate].push({gender:sg,note,time});
  save(); closeSheet(); renderCal(); renderStrip(); renderDay();
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderDailyChart() {
  const daysInMonth = new Date(chartVY, chartVM+1, 0).getDate();
  const labels=[], gd=[], bd=[];
  for(let d=1;d<=daysInMonth;d++) {
    const key=dKey(chartVY,chartVM,d);
    const bs=babies(key);
    labels.push(`${p2(chartVM+1)}/${p2(d)}`);
    gd.push(bs.filter(x=>x.gender==="girl").length);
    bd.push(bs.filter(x=>x.gender==="boy").length);
  }
  const maxVal=Math.max(5,...gd.map((g,i)=>g+bd[i]));
  document.getElementById("chart-month-label").textContent=`${MS[chartVM]} ${chartVY}`;

  const canvasD = document.getElementById("chart-daily");
  const wrapD = canvasD.parentElement;
  canvasD.width = wrapD.offsetWidth || 350;
  canvasD.height = 180;
  const ctxD = canvasD.getContext("2d");
  if(cDaily) cDaily.destroy();
  cDaily = new Chart(ctxD,{
    type:"bar",
    data:{labels,datasets:[
      {label:"Girls",data:gd,backgroundColor:"rgba(244,192,213,0.8)",borderRadius:4,borderSkipped:false},
      {label:"Boys",data:bd,backgroundColor:"rgba(170,207,232,0.8)",borderRadius:4,borderSkipped:false}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:([t])=>{
        const d=parseInt(t.label.split("/")[1],10);
        return `${MS[chartVM]} ${d}, ${chartVY}`;
      }}}},
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{maxTicksLimit:10,font:{size:9,family:"Figtree"},color:"#B0A090"}},
        y:{stacked:true,grid:{color:"rgba(80,60,40,0.05)"},ticks:{stepSize:1,precision:0,font:{size:10,family:"Figtree"},color:"#B0A090"},beginAtZero:true,max:maxVal}
      }
    }
  });
}


function renderCharts() {
  const all = allStats();

  document.getElementById("stat-grid").innerHTML=`
    <div class="stat-card"><div class="stat-card-num p">${all.g}</div><div class="stat-card-label">Total Girls</div></div>
    <div class="stat-card"><div class="stat-card-num b">${all.b}</div><div class="stat-card-label">Total Boys</div></div>
    <div class="stat-card"><div class="stat-card-num g">${all.total}</div><div class="stat-card-label">Total Births</div></div>
    <div class="stat-card"><div class="stat-card-num y">${all.days}</div><div class="stat-card-label">Days Recorded</div></div>`;

  renderDailyChart();

  const ctxDo = document.getElementById("chart-donut").getContext("2d");
  if(cDonut) cDonut.destroy();
  cDonut = new Chart(ctxDo,{
    type:"doughnut",
    data:{
      labels:["Girls","Boys"],
      datasets:[{
        data:all.total?[all.g,all.b]:[1,1],
        backgroundColor:["rgba(244,192,213,0.85)","rgba(170,207,232,0.85)"],
        borderWidth:0,hoverOffset:4
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:"65%",
      plugins:{legend:{display:false},tooltip:{enabled:all.total>0}}
    }
  });
  const gPct = all.total ? Math.round((all.g/all.total)*100) : 50;
  const bPct = all.total ? 100-gPct : 50;
  document.getElementById("donut-legend").innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:12px;height:12px;border-radius:50%;background:rgba(244,192,213,0.9);flex-shrink:0"></div>
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--ink-mid)">Girls</div>
          <div style="font-family:var(--fd);font-size:20px;color:var(--pink-deep);line-height:1">${all.g} <span style="font-family:var(--fu);font-size:11px;color:var(--ink-light)">${gPct}%</span></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:12px;height:12px;border-radius:50%;background:rgba(170,207,232,0.9);flex-shrink:0"></div>
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--ink-mid)">Boys</div>
          <div style="font-family:var(--fd);font-size:20px;color:var(--blue-deep);line-height:1">${all.b} <span style="font-family:var(--fu);font-size:11px;color:var(--ink-light)">${bPct}%</span></div>
        </div>
      </div>
    </div>`;

  const dc = DAYS.map((_,i)=>({day:DAYS[i],g:0,b:0}));
  Object.entries(data).forEach(([k,v])=>{
    const dt=new Date(k+"T12:00:00");
    v.forEach(x=>x.gender==="girl"?dc[dt.getDay()].g++:dc[dt.getDay()].b++);
  });
  const sorted=[...dc].sort((a,b)=>(b.g+b.b)-(a.g+a.b)).slice(0,5);
  const maxB=Math.max(1,...sorted.map(x=>x.g+x.b));
  document.getElementById("busy-days").innerHTML=sorted.map(x=>{
    const t=x.g+x.b, w=Math.round((t/maxB)*100);
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
      <div style="width:32px;font-size:12px;font-weight:600;color:var(--ink-mid);flex-shrink:0">${x.day}</div>
      <div style="flex:1;height:10px;background:rgba(80,60,40,0.07);border-radius:10px;overflow:hidden">
        <div style="height:100%;width:${w}%;background:linear-gradient(90deg,var(--pink-mid),var(--blue-mid));border-radius:10px"></div>
      </div>
      <div style="width:20px;font-size:12px;font-weight:700;color:var(--ink-mid);text-align:right;flex-shrink:0">${t}</div>
    </div>`;
  }).join("");

}

document.getElementById("fab").addEventListener("click",openSheet);
document.getElementById("overlay").addEventListener("click",closeSheet);
document.getElementById("save-btn").addEventListener("click",saveArrival);
document.getElementById("prev-m").addEventListener("click",()=>{ vM--; if(vM<0){vM=11;vY--;} renderCal();renderStrip(); });
document.getElementById("next-m").addEventListener("click",()=>{ vM++; if(vM>11){vM=0;vY++;} renderCal();renderStrip(); });
document.getElementById("chart-prev-m").addEventListener("click",()=>{ chartVM--; if(chartVM<0){chartVM=11;chartVY--;} renderDailyChart(); });
document.getElementById("chart-next-m").addEventListener("click",()=>{ chartVM++; if(chartVM>11){chartVM=0;chartVY++;} renderDailyChart(); });

// ── Swipe between tabs ──
let swipeStartX=0, swipeStartY=0, currentTab=0;
const pages = [document.getElementById("page-calendar"), document.getElementById("page-charts")];

function setTab(idx) {
  currentTab = idx;
  pages.forEach((p,i)=>{
    p.classList.toggle("active", i===idx);
  });
  document.getElementById("tab-calendar").classList.toggle("active", idx===0);
  document.getElementById("tab-charts").classList.toggle("active", idx===1);
  if(idx===1) renderCharts();
}

// Override tab button clicks
document.getElementById("tab-calendar").onclick=()=>setTab(0);
document.getElementById("tab-charts").onclick=()=>setTab(1);

document.getElementById("app").addEventListener("touchstart",e=>{ swipeStartX=e.touches[0].clientX; swipeStartY=e.touches[0].clientY; },{passive:true});
document.getElementById("app").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-swipeStartX;
  const dy=e.changedTouches[0].clientY-swipeStartY;
  if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>50) {
    if(dx<0 && currentTab===0) setTab(1);
    else if(dx>0 && currentTab===1) setTab(0);
  }
},{passive:true});

load(); renderHeader(); renderStrip(); renderCal(); renderDay();
document.getElementById("gnd-face-girl").innerHTML = girlSVG(56);
document.getElementById("gnd-face-boy").innerHTML = boySVG(56);

// Generate app icon dynamically as PNG and set as apple-touch-icon
(function() {
  const c = document.createElement("canvas");
  c.width = 180; c.height = 180;
  const ctx = c.getContext("2d");
  // Background rounded rect
  ctx.fillStyle = "#FEF8FB";
  ctx.beginPath(); ctx.roundRect(0,0,180,180,40); ctx.fill();
  // Swaddle body
  ctx.fillStyle = "#FDE8F2"; ctx.strokeStyle = "#D4789A"; ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(48,100); ctx.quadraticCurveTo(44,130,58,144);
  ctx.quadraticCurveTo(90,162,122,144); ctx.quadraticCurveTo(136,130,132,100);
  ctx.quadraticCurveTo(118,76,90,72); ctx.quadraticCurveTo(62,76,48,100);
  ctx.fill(); ctx.stroke();
  // Head
  ctx.fillStyle = "#FFF0E8"; ctx.strokeStyle = "#D4789A"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(90,72,36,32,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Cheeks
  ctx.fillStyle = "rgba(245,184,207,0.55)";
  ctx.beginPath(); ctx.ellipse(74,78,9,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(106,78,9,6,0,0,Math.PI*2); ctx.fill();
  // Eyes
  ctx.strokeStyle = "#C09090"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(78,63); ctx.quadraticCurveTo(84,69,90,63); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(90,63); ctx.quadraticCurveTo(96,69,102,63); ctx.stroke();
  // Smile
  ctx.strokeStyle = "#C8A0A0"; ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(82,82); ctx.quadraticCurveTo(90,88,98,82); ctx.stroke();
  // Bow
  ctx.fillStyle = "#F9C8DF"; ctx.strokeStyle = "#D4789A"; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(64,42); ctx.quadraticCurveTo(72,52,90,47);
  ctx.quadraticCurveTo(108,52,116,42); ctx.quadraticCurveTo(108,32,90,38);
  ctx.quadraticCurveTo(72,32,64,42);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#F0A8C4"; ctx.strokeStyle = "#D4789A"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(90,42,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Set as apple-touch-icon
  const url = c.toDataURL("image/png");
  let link = document.querySelector("link[rel='apple-touch-icon']");
  if(!link) { link = document.createElement("link"); link.rel = "apple-touch-icon"; document.head.appendChild(link); }
  link.href = url;
})();
