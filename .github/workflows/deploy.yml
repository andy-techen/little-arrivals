name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          echo "var SUPABASE_URL = \"${SUPABASE_URL}\";" > config.js
          echo "var SUPABASE_PUBLISHABLE_KEY = \"${SUPABASE_PUBLISHABLE_KEY}\";" >> config.js
          echo "var VAPID_PUBLIC_KEY = \"${VAPID_PUBLIC_KEY}\";" >> config.js
          cat config.js

      - name: Deploy Edge Function
        if: contains(join(github.event.commits.*.modified, ' '), 'supabase/functions/') || contains(join(github.event.commits.*.added, ' '), 'supabase/functions/')
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy dispatch-timers --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
